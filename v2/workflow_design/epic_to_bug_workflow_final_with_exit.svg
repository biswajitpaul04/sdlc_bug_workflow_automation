<svg width="100%" viewBox="0 0 800 900" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Epic to Bug Workflow</title>
  <desc>Automated workflow that reads epic descriptions and creates bug issues</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Main Title -->
  <text x="400" y="45" text-anchor="middle" font-size="24" font-weight="600" style="fill:rgb(20, 20, 19);font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">Epic to Bug Conversion Workflow</text>
  
  <!-- Subtitle -->
  <text x="400" y="70" text-anchor="middle" font-size="14" style="fill:rgb(95, 94, 90);font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">Automated workflow to read epic descriptions and create bug issues</text>

  <!-- ============================================================ -->
  <!-- STEP 1: SCHEDULED TRIGGER (Gray - Scheduling) -->
  <!-- ============================================================ -->
  <g style="cursor: pointer;">
    <rect x="160" y="100" width="480" height="70" rx="8" stroke-width="2" fill="rgb(241, 239, 232)" stroke="rgb(95, 94, 90)"/>
    <circle cx="195" cy="145" r="8" fill="rgb(178, 175, 159)"/>
    <text x="400" y="130" text-anchor="middle" font-size="16" font-weight="600" style="fill:rgb(68, 68, 65);font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">1. Scheduled Trigger</text>
    <text x="400" y="155" text-anchor="middle" font-size="12" style="fill:rgb(95, 94, 90);font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">Daily, weekly, or interval-based execution (cron job or scheduler)</text>
  </g>

  <!-- Arrow Down -->
  <line x1="400" y1="170" x2="400" y2="210" stroke="rgb(115, 114, 108)" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- STEP 2: AUTHENTICATE WITH JIRA (Blue - Jira Operations) -->
  <!-- ============================================================ -->
  <g style="cursor: pointer;">
    <rect x="120" y="210" width="560" height="70" rx="8" stroke-width="2" fill="rgb(230, 241, 251)" stroke="rgb(24, 95, 165)"/>
    <circle cx="155" cy="255" r="8" fill="rgb(24, 95, 165)"/>
    <text x="400" y="235" text-anchor="middle" font-size="16" font-weight="600" style="fill:rgb(12, 68, 124);font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">2. Authenticate with Jira API</text>
    <text x="400" y="260" text-anchor="middle" font-size="12" style="fill:rgb(24, 95, 165);font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">Connect using API token and credentials</text>
  </g>

  <!-- Arrow Down -->
  <line x1="400" y1="280" x2="400" y2="320" stroke="rgb(115, 114, 108)" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- STEP 3: FETCH EPICS (Blue - Jira Operations) -->
  <!-- ============================================================ -->
  <g style="cursor: pointer;">
    <rect x="120" y="320" width="560" height="70" rx="8" stroke-width="2" fill="rgb(230, 241, 251)" stroke="rgb(24, 95, 165)"/>
    <circle cx="155" cy="365" r="8" fill="rgb(24, 95, 165)"/>
    <text x="400" y="345" text-anchor="middle" font-size="16" font-weight="600" style="fill:rgb(12, 68, 124);font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">3. Fetch Epics from Jira</text>
    <text x="400" y="370" text-anchor="middle" font-size="12" style="fill:rgb(24, 95, 165);font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">Query epics by JQL or specific keys (get description, summary, status)</text>
  </g>

  <!-- Arrow Down -->
  <line x1="400" y1="390" x2="400" y2="430" stroke="rgb(115, 114, 108)" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- DECISION DIAMOND: Any Epics Found? -->
  <!-- ============================================================ -->
  <g style="cursor: pointer;">
    <!-- Diamond -->
    <polygon points="400,430 480,485 400,540 320,485" fill="rgb(255, 247, 223)" stroke="rgb(177, 145, 48)" stroke-width="2"/>
    <text x="400" y="480" text-anchor="middle" font-size="14" font-weight="600" style="fill:rgb(114, 91, 21);font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">Any Epics</text>
    <text x="400" y="500" text-anchor="middle" font-size="14" font-weight="600" style="fill:rgb(114, 91, 21);font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">Found?</text>
  </g>

  <!-- NO Path - Arrow to left -->
  <line x1="320" y1="485" x2="200" y2="485" stroke="rgb(115, 114, 108)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="260" y="475" font-size="11" style="fill:rgb(95, 94, 90);font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">No</text>

  <!-- NO Path - Down to exit box -->
  <line x1="200" y1="485" x2="200" y2="600" stroke="rgb(115, 114, 108)" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- NO Path - Exit Box -->
  <g style="cursor: pointer;">
    <rect x="80" y="600" width="240" height="60" rx="8" stroke-width="2" fill="rgb(255, 245, 245)" stroke="rgb(200, 100, 100)"/>
    <circle cx="115" cy="635" r="8" fill="rgb(200, 100, 100)"/>
    <text x="200" y="630" text-anchor="middle" font-size="14" font-weight="600" style="fill:rgb(180, 50, 50);font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">No Epics Found</text>
    <text x="200" y="650" text-anchor="middle" font-size="11" style="fill:rgb(150, 80, 80);font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">Exit Gracefully</text>
  </g>

  <!-- NO Path - Down to final complete -->
  <line x1="200" y1="660" x2="200" y2="800" stroke="rgb(115, 114, 108)" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="200" y1="800" x2="280" y2="800" stroke="rgb(115, 114, 108)" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- YES Path - Arrow Down -->
  <line x1="400" y1="540" x2="400" y2="580" stroke="rgb(115, 114, 108)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="565" font-size="11" style="fill:rgb(95, 94, 90);font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">Yes</text>

  <!-- ============================================================ -->
  <!-- STEP 4: CREATE BUG ISSUE (Purple - Code Generation/Creation) -->
  <!-- ============================================================ -->
  <g style="cursor: pointer;">
    <rect x="80" y="580" width="640" height="70" rx="8" stroke-width="2" fill="rgb(238, 237, 254)" stroke="rgb(83, 74, 183)"/>
    <circle cx="115" cy="625" r="8" fill="rgb(83, 74, 183)"/>
    <text x="400" y="605" text-anchor="middle" font-size="16" font-weight="600" style="fill:rgb(60, 52, 137);font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">4. Create Bug Issue from Epic</text>
    <text x="400" y="630" text-anchor="middle" font-size="12" style="fill:rgb(83, 74, 183);font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">Map epic details (summary, description, labels, priority, components) to bug issue</text>
  </g>

  <!-- Arrow Down -->
  <line x1="400" y1="650" x2="400" y2="690" stroke="rgb(115, 114, 108)" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- STEP 5: UPDATE STATUS & LOGGING (Blue - Jira Operations) -->
  <!-- ============================================================ -->
  <g style="cursor: pointer;">
    <rect x="100" y="690" width="600" height="70" rx="8" stroke-width="2" fill="rgb(230, 241, 251)" stroke="rgb(24, 95, 165)"/>
    <circle cx="135" cy="735" r="8" fill="rgb(24, 95, 165)"/>
    <text x="400" y="715" text-anchor="middle" font-size="16" font-weight="600" style="fill:rgb(12, 68, 124);font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">5. Log & Update Status</text>
    <text x="400" y="740" text-anchor="middle" font-size="12" style="fill:rgb(24, 95, 165);font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">Record creation status, log results, update issue tracking</text>
  </g>

  <!-- Loop Back Arrow (Next Epic) -->
  <path d="M 700 725 L 750 725 L 750 365 L 680 365" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
  <text x="760" y="550" font-size="12" style="fill:rgb(95, 94, 90);font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">Process</text>
  <text x="760" y="565" font-size="12" style="fill:rgb(95, 94, 90);font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">Next Epic</text>

  <!-- Arrow Down to Complete -->
  <line x1="400" y1="760" x2="400" y2="800" stroke="rgb(115, 114, 108)" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- STEP 6: WORKFLOW COMPLETE (Green - Success) -->
  <!-- ============================================================ -->
  <g style="cursor: pointer;">
    <rect x="240" y="800" width="320" height="50" rx="8" stroke-width="2" fill="rgb(234, 243, 222)" stroke="rgb(59, 109, 17)"/>
    <circle cx="275" cy="830" r="8" fill="rgb(59, 109, 17)"/>
    <text x="400" y="830" text-anchor="middle" font-size="16" font-weight="600" style="fill:rgb(39, 80, 10);font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">✓ Workflow Complete</text>
  </g>

  <!-- ============================================================ -->
  <!-- LEGEND -->
  <!-- ============================================================ -->
  <g style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
    <!-- Legend Title -->
    <text x="40" y="855" font-size="12" font-weight="600" style="fill:rgb(61, 61, 58);">Legend:</text>

    <!-- Scheduling Box -->
    <rect x="40" y="865" width="14" height="14" rx="3" fill="rgb(241, 239, 232)" stroke="rgb(95, 94, 90)" stroke-width="1"/>
    <text x="60" y="875" font-size="11" style="fill:rgb(61, 61, 58);">Scheduling</text>

    <!-- Jira Operations Box -->
    <rect x="220" y="865" width="14" height="14" rx="3" fill="rgb(230, 241, 251)" stroke="rgb(24, 95, 165)" stroke-width="1"/>
    <text x="240" y="875" font-size="11" style="fill:rgb(61, 61, 58);">Jira Operations</text>

    <!-- Creation Box -->
    <rect x="420" y="865" width="14" height="14" rx="3" fill="rgb(238, 237, 254)" stroke="rgb(83, 74, 183)" stroke-width="1"/>
    <text x="440" y="875" font-size="11" style="fill:rgb(61, 61, 58);">Creation/Processing</text>

    <!-- Success Box -->
    <rect x="620" y="865" width="14" height="14" rx="3" fill="rgb(234, 243, 222)" stroke="rgb(59, 109, 17)" stroke-width="1"/>
    <text x="640" y="875" font-size="11" style="fill:rgb(61, 61, 58);">Success</text>
  </g>

  <!-- Information Boxes on the sides -->
  <!-- Left side information -->
  <g style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
    <!-- Input/Output Info -->
    <text x="20" y="105" font-size="11" font-weight="600" style="fill:rgb(68, 68, 65);">INPUTS:</text>
    <text x="20" y="120" font-size="10" style="fill:rgb(95, 94, 90);">• Jira URL & Credentials</text>
    <text x="20" y="133" font-size="10" style="fill:rgb(95, 94, 90);">• Epic Keys or JQL Query</text>
    <text x="20" y="146" font-size="10" style="fill:rgb(95, 94, 90);">• Bug Configuration</text>
  </g>

  <g style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
    <!-- Output Info -->
    <text x="20" y="185" font-size="11" font-weight="600" style="fill:rgb(68, 68, 65);">OUTPUTS:</text>
    <text x="20" y="200" font-size="10" style="fill:rgb(95, 94, 90);">• Bug Issues Created</text>
    <text x="20" y="213" font-size="10" style="fill:rgb(95, 94, 90);">• Execution Logs</text>
    <text x="20" y="226" font-size="10" style="fill:rgb(95, 94, 90);">• Status Report</text>
  </g>

  <!-- Right side usage info -->
  <g style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
    <!-- Usage Info -->
    <text x="665" y="105" font-size="11" font-weight="600" style="fill:rgb(68, 68, 65); text-anchor: end;">USAGE:</text>
    <text x="665" y="120" font-size="10" style="fill:rgb(95, 94, 90); text-anchor: end;">✓ One-time execution</text>
    <text x="665" y="133" font-size="10" style="fill:rgb(95, 94, 90); text-anchor: end;">✓ Daily automation</text>
    <text x="665" y="146" font-size="10" style="fill:rgb(95, 94, 90); text-anchor: end;">✓ Bulk processing</text>
  </g>

  <g style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
    <!-- Config Info -->
    <text x="665" y="185" font-size="11" font-weight="600" style="fill:rgb(68, 68, 65); text-anchor: end;">CONFIGURATION:</text>
    <text x="665" y="200" font-size="10" style="fill:rgb(95, 94, 90); text-anchor: end;">→ .env file (credentials)</text>
    <text x="665" y="213" font-size="10" style="fill:rgb(95, 94, 90); text-anchor: end;">→ JQL queries (filtering)</text>
    <text x="665" y="226" font-size="10" style="fill:rgb(95, 94, 90); text-anchor: end;">→ Field mappings (custom)</text>
  </g>

</svg>
